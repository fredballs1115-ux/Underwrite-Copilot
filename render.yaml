# Render Blueprint — defines the cloud service(s) for Underwrite Copilot.
#
# To use it: push this repo to GitHub, then in Render choose
# "New → Blueprint" and point it at the repo. Render reads this file and
# creates the service below. You fill in the secret values in the dashboard
# (they're marked `sync: false`, so they are never read from the repo).
#
# Why Render: it runs the app as a normal always-on server, so the long OM
# analysis can run as a background job without the function timeouts a
# serverless host would hit.

services:
  # ── The web app (Next.js) ─────────────────────────────────────────────────
  - type: web
    name: underwrite-copilot-web
    runtime: node
    plan: starter # always-on. Use "free" for cheap testing (it sleeps when idle).
    branch: main
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ANTHROPIC_API_KEY
        sync: false # set in the dashboard; never committed
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # Stripe billing — set in the dashboard (see .env.example for how to get each).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Hand analyses to the dedicated worker below. ONLY set this to "1"
      # after (a) migration 0016 has been run and (b) the worker service is
      # live — with the flag on and no worker, screens would queue forever.
      # Unset/empty = analyses run in-process exactly as before.
      # - key: ANALYSIS_WORKER
      #   value: "1"

  # ── The dedicated analysis worker (Phase 2 — built) ────────────────────────
  # Runs the OM screens so web deploys never interrupt them: the web app
  # enqueues, this service claims + runs + checkpoints each step, and a deploy
  # just re-queues the in-flight job for the replacement instance to RESUME.
  # Same repo, same commit as the web app. Full setup: worker/README.md.
  - type: worker
    name: underwrite-copilot-worker
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: npm install && npm run build:worker
    startCommand: npm run start:worker
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Emails link back to the app — keep identical to the web service.
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # Optional: analysis-ready emails (same values as the web service).
      # - key: RESEND_API_KEY
      #   sync: false
      # - key: RESEND_FROM
      #   sync: false
